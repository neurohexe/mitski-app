<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Складской учет</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; color: #1a1a2e; }
        .navbar { background: linear-gradient(135deg, #1a1a2e, #0f3460); padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .navbar .logo { color: #fff; font-size: 22px; font-weight: 700; }
        .navbar .logo i { color: #4fc3f7; margin-right: 10px; }
        .btn-auth { background: #4fc3f7; border: none; color: #1a1a2e; padding: 8px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn-auth.logout { background: #ef5350; color: #fff; }
        .main-container { max-width: 1400px; margin: 0 auto; padding: 24px 32px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: #fff; border-radius: 14px; padding: 18px 22px; border: 1px solid #e8eaed; }
        .stat-card .stat-value { font-size: 28px; font-weight: 700; }
        .stat-card .stat-label { font-size: 12px; color: #6b7a8f; text-transform: uppercase; }
        .table-container { background: #fff; border-radius: 14px; border: 1px solid #e8eaed; overflow: hidden; }
        .table-toolbar { padding: 16px 20px; display: flex; gap: 12px; flex-wrap: wrap; border-bottom: 1px solid #e8eaed; background: #fafbfc; }
        .table-toolbar .search-box { display: flex; align-items: center; gap: 8px; background: #fff; border: 1px solid #d2d5d9; border-radius: 8px; padding: 6px 14px; flex: 1; max-width: 400px; }
        .table-toolbar .search-box input { border: none; outline: none; width: 100%; font-family: inherit; }
        .table-wrapper { overflow-x: auto; padding: 4px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        table thead { background: #f8f9fa; }
        table thead th { padding: 12px 16px; text-align: left; font-weight: 600; color: #3c4043; border-bottom: 2px solid #e8eaed; font-size: 12px; text-transform: uppercase; }
        table tbody td { padding: 11px 16px; border-bottom: 1px solid #f0f2f5; }
        table tbody tr:hover { background: #f8f9fa; }
        .status-badge { display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-badge.active { background: #e8f5e9; color: #2e7d32; }
        .status-badge.low { background: #fff3e0; color: #e65100; }
        .status-badge.medium { background: #e3f2fd; color: #0d47a1; }
        .status-badge.high { background: #e8f5e9; color: #1b5e20; }
        .status-badge.inactive { background: #fce4ec; color: #c62828; }
        .loading-spinner { text-align: center; padding: 40px; color: #6b7a8f; }
        .loading-spinner i { font-size: 32px; animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
        .toast { padding: 14px 22px; border-radius: 12px; color: #fff; font-weight: 500; font-size: 14px; box-shadow: 0 6px 24px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 10px; min-width: 280px; }
        .toast.success { background: #43a047; }
        .toast.error { background: #e53935; }
        .toast.info { background: #1e88e5; }
        .toast.warning { background: #fb8c00; }
        .toast-close { margin-left: auto; background: none; border: none; color: rgba(255,255,255,0.6); cursor: pointer; font-size: 20px; }
        .btn-primary { background: linear-gradient(135deg, #4fc3f7, #29b6f6); border: none; color: #1a1a2e; padding: 10px 24px; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .btn-secondary { background: #e8eaed; border: none; padding: 10px 24px; border-radius: 10px; font-weight: 500; cursor: pointer; }
        .user-status { color: #b0bec5; font-size: 13px; }
        .user-status i { margin-right: 4px; }
        @media (max-width: 768px) { .navbar { padding: 12px 16px; flex-direction: column; } .main-container { padding: 16px; } }
    </style>
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar">
    <div class="logo"><i class="fas fa-warehouse"></i>Складской учет</div>
    <div>
        <span class="user-status" id="userStatus"><i class="fas fa-circle"></i> Не авторизован</span>
        <button class="btn-auth" id="authBtn" onclick="handleAuth()"><i class="fas fa-google"></i> Войти</button>
    </div>
</nav>

<!-- ===== MAIN ===== -->
<div class="main-container">
    <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Всего товаров</div><div class="stat-value" id="statTotal">—</div></div>
        <div class="stat-card"><div class="stat-label">Активных</div><div class="stat-value" id="statActive">—</div></div>
        <div class="stat-card"><div class="stat-label">Низкий остаток</div><div class="stat-value" id="statLow">—</div></div>
        <div class="stat-card"><div class="stat-label">Заказов сегодня</div><div class="stat-value" id="statOrders">—</div></div>
    </div>

    <div class="table-container">
        <div class="table-toolbar">
            <div class="search-box"><i class="fas fa-search"></i><input type="text" placeholder="Поиск товаров..." id="searchInput" oninput="filterTable()" /></div>
            <button class="btn-primary" onclick="loadData()"><i class="fas fa-sync-alt"></i> Обновить</button>
        </div>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Название</th><th>Категория</th><th>Количество</th><th>Ед. изм.</th><th>Статус</th></tr></thead>
                <tbody id="tableBody"><tr><td colspan="5"><div class="loading-spinner"><i class="fas fa-spinner"></i> Загрузка...</div></td></tr></tbody>
            </table>
        </div>
    </div>
</div>

<div id="toastContainer" class="toast-container"></div>

<script>

const CLIENT_ID = '309525177557-l6vvaijhpt48r7b59qeo2pr0eotdou5h.apps.googleusercontent.com';
const SPREADSHEET_ID = '1Xle7P0sZk_HTu2O1tp3pPymBI-_S70KKltbPJn1ldks';
const API_KEY = 'AIzaSyDlQSx5CI-CRqfe76jV1bdILnlTBHASnj0';
const DISCOVERY_DOC = 'https://sheets.googleapis.com/$discovery/rest?version=v4';
const SCOPES = 'https://www.googleapis.com/auth/spreadsheets';

let tokenClient, gapiInited = false, gisInited = false, isAuthenticated = false;

function gapiLoaded() { gapi.load('client', async () => { await gapi.client.init({ apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC] }); gapiInited = true; }); }
function gisLoaded() { tokenClient = google.accounts.oauth2.initTokenClient({ client_id: CLIENT_ID, scope: SCOPES, callback: '' }); gisInited = true; }

function handleAuth() {
    const btn = document.getElementById('authBtn');
    if (isAuthenticated) { handleSignout(); return; }
    tokenClient.callback = async (resp) => {
        if (resp.error) { showToast('Ошибка: ' + resp.error, 'error'); return; }
        isAuthenticated = true;
        document.getElementById('userStatus').innerHTML = '<i class="fas fa-circle" style="color:#81c784;"></i> Авторизован';
        btn.innerHTML = '<i class="fas fa-sign-out-alt"></i> Выйти';
        btn.className = 'btn-auth logout';
        showToast('✅ Авторизация выполнена!', 'success');
        await loadData();
    };
    if (gapi.client.getToken() === null) tokenClient.requestAccessToken({ prompt: 'consent' });
    else tokenClient.requestAccessToken({ prompt: '' });
}

function handleSignout() {
    const token = gapi.client.getToken();
    if (token) { google.accounts.oauth2.revoke(token.access_token); gapi.client.setToken(''); }
    isAuthenticated = false;
    document.getElementById('userStatus').innerHTML = '<i class="fas fa-circle"></i> Не авторизован';
    document.getElementById('authBtn').innerHTML = '<i class="fas fa-google"></i> Войти';
    document.getElementById('authBtn').className = 'btn-auth';
    showToast('🔓 Вы вышли', 'info');
}

async function loadData() {
    if (!isAuthenticated) { showToast('⚠️ Сначала авторизуйтесь!', 'warning'); return; }
    try {
        const response = await gapi.client.sheets.spreadsheets.values.get({
            spreadsheetId: SPREADSHEET_ID,
            range: 'Склад_Продукты!A2:E'
        });
        const rows = response.result.values || [];
        if (rows.length === 0) { document.getElementById('tableBody').innerHTML = '<tr><td colspan="5">Нет данных</td></tr>'; return; }
        
        let html = '', total = 0, active = 0, low = 0;
        rows.forEach(row => {
            const name = row[0] || '—';
            const qty = parseInt(row[1]) || 0;
            const unit = row[2] || 'шт';
            const category = row[3] || '—';
            const isActive = row[4] === 'true' || row[4] === true;
            total++; if (isActive) active++; if (isActive && qty < 5) low++;
            let status = '', cls = '';
            if (!isActive) { status = 'Неактивный'; cls = 'inactive'; }
            else if (qty < 5) { status = 'Низкий остаток'; cls = 'low'; }
            else if (qty < 20) { status = 'Средний'; cls = 'medium'; }
            else { status = 'В наличии'; cls = 'high'; }
            html += `<tr><td>${name}</td><td>${category}</td><td>${qty}</td><td>${unit}</td><td><span class="status-badge ${cls}">${status}</span></td></tr>`;
        });
        document.getElementById('tableBody').innerHTML = html;
        document.getElementById('statTotal').textContent = rows.length;
        document.getElementById('statActive').textContent = active;
        document.getElementById('statLow').textContent = low;
        document.getElementById('statOrders').textContent = '—';
        showToast('✅ Данные загружены', 'success');
    } catch (e) {
        showToast('Ошибка: ' + e.message, 'error');
        console.error(e);
    }
}

function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    document.querySelectorAll('#tableBody tr').forEach(row => {
        row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
}

function showToast(msg, type = 'info') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle', info: 'fa-info-circle' };
    toast.innerHTML = `<i class="fas ${icons[type] || icons.info}"></i> ${msg} <button class="toast-close" onclick="this.parentElement.remove()">&times;</button>`;
    container.appendChild(toast);
    setTimeout(() => { if (toast.parentElement) toast.remove(); }, 5000);
}

// Загрузка библиотек Google
document.write('<script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"><\/script>');
document.write('<script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"><\/script>');
</script>
</body>
</html>
